<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bom_dom</title>
    <script src="./scripts/bom_dom.js" defer></script>
    <link rel="stylesheet" href="./style/reset.css">
    <style>
        #starbucks {}
        #starbucks .tab_title {display: flex;}
        #starbucks .tab_title a {padding: 20px; background-color: #f5f5f5;}
        #starbucks .tab_title .active {background-color: #006633; color: #fff;}
        #starbucks .tab_contents {width: 820px;}
        #starbucks .tab_contents .category {height: 400px; border: 1px solid #006633;}
        #starbucks .tab_contents .theme {height: 400px; border: 1px solid #006633;}
    </style>
</head>
<body>
    <div id="starbucks">
        <div class="tab_title">
            <a href="#" class="active">카테고리</a>
            <a href="#">테마</a>
        </div>
        <div class="tab_contents">
            <div class="contents category">category내용</div>
            <div class="contents theme">theme내용</div>
        </div>
    </div>
    <h2>로고</h2>
    <div class="box">
        <h1 class="title">대제목</h1>
        <h2>중제목</h2>
        <h3 class="title">소제목</h3>
        <p id="txt">아이디 적용 문장</p>
    </div>
    <hr>
    <button type="button"
        onclick="alert('결제가 완료되었습니다.')">결제 확인버튼</button>
    <button type="button"
        onclick="alert('1개의 상품을 \n장바구니에 담았습니다.')">장바구니 담기</button>
    <button type="button"
        onclick="window.confirm('인쇄하시겠습니까?')">인쇄</button>
    <button type="button"
        onclick="confirm('결제하시겠습니까?')">결제하기</button>
    <button type="button"
        onclick="window.location.href='https://google.com'">google 바로가기</button>
    <button type="button" 
        onclick="naverUrl()">네이버 바로가기</button>
    <button type="button"
        onclick="prt()">인쇄</button>
    <button type="button"
    onclick="open1()">파파고 바로가기</button>
    <hr>
    <button type="button" onclick="open2('naver')">네이버 바로가기</button>
    <button type="button" onclick="open2('google')">구글 바로가기</button>

    <button type="button" onclick="msg('결제')">결제하기</button>
    <button type="button" onclick="msg('인쇄')">인쇄하기</button>
    <button type="button" onclick="msg('가입')">가입하기</button>

    <script>
        // 내부스크립트(body 내부 태그들을 모두 읽고 스크립트 실행하는 순서)
        function naverUrl(){
            window.location.href = 'https://naver.com';
        }
        function prt(){ // 내장함수랑 함수명 동일하게 쓰면 오류!
            window.confirm('인쇄하시겠습니까?');
            window.print();
        }
        function open1(){
            /* window.open('주소','위치') */
            window.open('https://papago.naver.com', '_blank')
        }
        function open2(url){
            open(`https://${url}.com`,'_blank') // 벡틱기호 사용 해서 주소 안에 매개함수 들어가게하기.
        }
        function msg(text){
            confirm(`${text}하시겠습니까?`);
        }
        //결제하시겠습니까?
        //인쇄하시겠습니까?
        //가입하시겠습니까?
    </script>
</body>
</html>
